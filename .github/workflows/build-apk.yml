name: Build APK  # 工作流名称

on:             # 触发条件
  push:         # 当你推送代码到 main 分支时自动触发
    branches: [ main ]
  workflow_dispatch:  # 也支持在网页上手动点击运行（推荐用这个）

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 GitHub 免费服务器
    steps:
      - name: Checkout Repository  # 1. 拉取你的代码
        uses: actions/checkout@v4

      - name: Set up JDK 11         # 2. 配置 Java 环境（兼容性最好）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK       # 3. 执行编译命令
        run: ./gradlew assembleDebug

      - name: Upload APK             # 4. 上传生成的 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: app-debug  # 压缩包名称
          path: app/build/outputs/apk/debug/*.apk
